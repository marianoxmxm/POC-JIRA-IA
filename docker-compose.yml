version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: poc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  orquestador:
    build: .
    container_name: poc-orquestador
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: